# Use this workflow when the Git repository ROOT is this Expo app (not the monorepo).
# If your remote is lolityapp-v2 with folder mobile_app_new/, use instead:
#   .github/workflows/mobile-android-apk.yml at repository root.
#
# Keystore: ANDROID_KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD (secrets)
# Stripe/Google/Maps/API: secrets OR fill config/build-time-env.js (see .env.example)

name: Build Android APK (Local)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build Type"
        required: false
        default: "release"
        type: choice
        options:
          - release

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Apply config/build-time-env.js to runner env
        run: node scripts/write-github-env-from-defaults.cjs

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - run: npm ci

      - name: Check configuration
        run: |
          if [ -z "$GOOGLE_MAPS_API_KEY" ]; then echo "::warning::GOOGLE_MAPS_API_KEY empty — set secret or config/build-time-env.js"; fi
          if [ -z "$EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID" ]; then echo "::warning::EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID empty"; fi
          if [ -z "$EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY" ]; then echo "::warning::EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY empty"; fi
          if [ -z "$EXPO_PUBLIC_API_URL" ]; then echo "::warning::EXPO_PUBLIC_API_URL empty"; fi

      - name: Expo prebuild
        run: npx expo prebuild --platform android
        env:
          EXPO_NO_DOTENV: 1

      - name: Gradle JVM heap
        run: |
          GP="android/gradle.properties"
          if [ ! -f "$GP" ]; then echo "Missing $GP"; exit 1; fi
          HEAP='org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8'
          if grep -q '^org.gradle.jvmargs=' "$GP"; then sed -i "s|^org.gradle.jvmargs=.*|$HEAP|" "$GP"; else echo "$HEAP" >> "$GP"; fi

      - name: Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: assembleRelease
        run: |
          cd android
          chmod +x ./gradlew
          KEYSTORE_PATH="${GITHUB_WORKSPACE}/android/app/release.keystore"
          ./gradlew assembleRelease --no-daemon --build-cache \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
        env:
          EXPO_NO_DOTENV: 1
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

      - uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Done
        run: ls -lh android/app/build/outputs/apk/*/*.apk
